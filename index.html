<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextWizard — Free Online Text & Code Tools</title>
  <meta name="description" content="Free online text and code tools: convert case, clean whitespace, format JSON, encode/decode Base64, hash, diff, translate, and more. Works in your browser — nothing is uploaded." />
  <meta name="keywords" content="text tools, case converter, whitespace remover, json formatter, base64, sha256, regex tester, diff, nato phonetic, pig latin, morse code, online text utilities" />
  <meta name="author" content="Michal Ferber" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://textwizard.us/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TextWizard" />
  <meta property="og:title" content="TextWizard — Free Online Text & Code Tools" />
  <meta property="og:description" content="Convert case, clean whitespace, format JSON, encode/decode Base64, hash, diff, translate, and more — all in your browser." />
  <meta property="og:url" content="https://textwizard.us/" />
  <meta property="og:image" content="https://textwizard.us/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TextWizard — Free Online Text & Code Tools" />
  <meta name="twitter:description" content="Convert case, clean whitespace, format JSON, encode/decode Base64, hash, diff, translate, and more — all in your browser." />
  <meta name="twitter:image" content="https://textwizard.us/og-image.png" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "TextWizard",
    "url": "https://textwizard.us/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires a modern browser",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "description": "Free online text and code tools that run entirely in the browser."
  }
  </script>

  <script>
    // Apply theme before render to prevent flash of wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('tw::theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />

  <!-- Plausible Analytics — privacy-friendly, cookieless, self-hosted.
       The script.hash.js variant is used because this app is hash-routed
       (each tool is a #route), so tool views are recorded as pageviews.
       data-domain must match the site's domain configured in Plausible. -->
  <script defer data-domain="textwizard.us" src="https://plausible.thomsonblack.us/js/script.hash.js"></script>
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="/" aria-label="TextWizard home">
      <span class="brand-icon">✨</span>
      <span class="brand-name">TextWizard</span>
    </a>
    <nav id="nav" class="nav"></nav>
    <div class="sidebar-footer">
      <a class="footer-link" href="/privacy">Privacy</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle dark mode">
        <span class="theme-toggle-icon" data-icon-light>☾</span>
        <span class="theme-toggle-icon" data-icon-dark>☀</span>
      </button>
    </div>
  </aside>

  <main id="main" class="main">
    <!-- Active feature renders here -->
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
